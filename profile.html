<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCC — Member Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F7F5F0;--surface:#fff;--surface2:#F0EDE8;--border:#E5E2DA;
      --ink:#1A1A1A;--muted:#888;--gold:#9A6E1A;--gold-light:#C9A84C;
      --green:#0F6E56;--green-bg:#E1F5EE;--blue:#185FA5;--blue-bg:#E6F1FB;
      --amber:#854F0B;--amber-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

    header{background:rgba(247,245,240,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 2rem;gap:12px;position:sticky;top:0;z-index:100;}
    .back-btn{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:none;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.15s;}
    .back-btn:hover{color:var(--ink);border-color:var(--ink);}
    .header-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--ink);}
    .header-sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

    /* POSTER */
    .poster{
      position:relative;width:100%;max-width:360px;
      aspect-ratio:9/16;border-radius:10px;overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }
    .poster-bg{position:absolute;inset:0;background-size:cover;background-position:center top;background:#1A1A1A;z-index:0;}
    .poster-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.15) 35%,rgba(0,0,0,0.85) 70%,rgba(0,0,0,0.96) 100%);z-index:1;}
    .poster-grain{position:absolute;inset:0;opacity:0.05;z-index:2;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

    /* TOP BAR */
    .poster-top{position:absolute;top:0;left:0;right:0;z-index:3;padding:1.25rem 1.25rem 0;display:flex;justify-content:space-between;align-items:flex-start;}
    .poster-club-label{font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.55);}
    .poster-stamp{font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--gold-light);border:1px solid rgba(201,168,76,0.4);padding:3px 8px;border-radius:2px;}

    /* BOTTOM CONTENT */
    .poster-bottom{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:1.25rem;}
    .poster-role{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--gold-light);margin-bottom:6px;letter-spacing:0.02em;}
    .poster-name{font-family:'Playfair Display',serif;font-size:clamp(38px,10vw,52px);color:#fff;line-height:1;margin-bottom:12px;text-shadow:0 2px 20px rgba(0,0,0,0.6);}
    .poster-divider{width:40px;height:1px;background:var(--gold-light);margin-bottom:12px;opacity:0.6;}
    .poster-stats{display:flex;gap:1.25rem;margin-bottom:14px;}
    .ps-val{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold-light);line-height:1;}
    .ps-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-top:2px;}
    .poster-genre{display:inline-block;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border:1px solid rgba(201,168,76,0.4);color:var(--gold-light);border-radius:2px;margin-right:5px;margin-bottom:10px;}
    .poster-badges{display:flex;gap:5px;flex-wrap:wrap;}
    .poster-badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(4px);}
    .poster-tagline{font-size:10px;color:rgba(255,255,255,0.4);font-style:italic;margin-top:10px;line-height:1.5;}

    /* DESKTOP TWO COLUMN LAYOUT */
    .profile-layout{display:flex;gap:2rem;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 3rem;align-items:flex-start;}
    @media(min-width:769px){.poster-col{position:sticky;top:72px;}}
    .poster-col{flex-shrink:0;width:300px;}
    .poster-wrap{display:block;padding:0;width:300px;}
    .poster{max-width:300px !important;}
    .sidebar{flex:1;min-width:0;}
    .content{padding:0;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
    @media(max-width:768px){
      .profile-layout{flex-direction:column;gap:0;padding:0 0 3rem;}
      .poster-col{width:100%;position:static;}
      .poster-wrap{display:flex !important;justify-content:center;padding:2rem 1rem 1.5rem;width:100%;}
      .poster{max-width:360px !important;width:100%;}
      .sidebar{padding:0 1.25rem;width:100%;}
    }
    @media(max-width:500px){.grid-2{grid-template-columns:1fr;}}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem;}
    .card-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}

    .rating-bar-wrap{margin-bottom:0.75rem;}
    .rating-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink);margin-bottom:4px;}
    .rating-bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .rating-bar-fill{height:100%;border-radius:3px;}

    .points-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .points-row:last-child{border-bottom:none;}
    .points-type{color:var(--muted);}
    .points-val{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);}
    .rank-big{font-family:'Playfair Display',serif;font-size:44px;color:var(--gold);line-height:1;}
    .rank-lbl{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}

    .review-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
    .review-item:last-child{border-bottom:none;}
    .review-score{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);min-width:36px;text-align:center;line-height:1;padding-top:2px;}
    .review-info{flex:1;}
    .review-film{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;}
    .review-take{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;}
    .review-date{font-size:10px;color:#BBB;margin-top:4px;}
    .review-pill{display:inline-block;font-size:8px;font-weight:600;padding:2px 6px;border-radius:999px;margin-left:6px;vertical-align:middle;}

    .stat-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);line-height:1;}
    .stat-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
    .stat-sub{font-size:10px;color:var(--muted);margin-top:1px;}
    .stats-row{display:flex;gap:1.5rem;flex-wrap:wrap;}

    .empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
    .loading{text-align:center;padding:4rem;color:var(--muted);font-size:14px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .fade{animation:fadeUp 0.4s ease both;}

    footer{text-align:center;padding:2rem;font-size:11px;color:#CCC;letter-spacing:0.06em;text-transform:uppercase;}

    /* Letterboxd button */
    .lb-btn{display:inline-flex;align-items:center;gap:6px;background:#00C030;color:#fff;text-decoration:none;padding:6px 14px;border-radius:3px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-top:8px;}
  </style>
</head>
<body>

<header>
  <a href="https://zimuzodocs.github.io/thecinematiccircle" class="back-btn">← Hub</a>
  <div>
    <div class="header-title">The Cinematic Circle</div>
    <div class="header-sub">Member Profile</div>
  </div>
</header>

<div id="loading" class="loading">Loading profile…</div>
<div id="profile-wrap" style="display:none;">

  <div class="profile-layout">
  <!-- LEFT: MOVIE POSTER -->
  <div class="poster-col">
  <div class="poster-wrap">
    <div class="poster fade">
      <div class="poster-bg" id="poster-bg"></div>
      <div class="poster-overlay"></div>
      <div class="poster-grain"></div>
      <!-- TOP -->
      <div class="poster-top">
        <div class="poster-club-label">The Cinematic Circle</div>
        <div class="poster-stamp">TCC 2026</div>
      </div>
      <!-- BOTTOM -->
      <div class="poster-bottom">
        <div class="poster-role" id="poster-role"></div>
        <div class="poster-name" id="poster-name">—</div>
        <div class="poster-divider"></div>
        <div class="poster-stats" id="poster-stats"></div>
        <div id="poster-genres"></div>
        <div class="poster-badges" id="poster-badges"></div>
        <div class="poster-tagline" id="poster-tagline"></div>
      </div>
    </div>
  </div>

  </div><!-- end poster -->
  </div><!-- end poster-wrap -->
  <!-- LETTERBOXD -->
  <div style="text-align:center;margin-bottom:1rem;" id="lb-wrap"></div>

  </div><!-- end poster-col -->

  <!-- RIGHT: SIDEBAR -->
  <div class="sidebar">
  <div class="content">
    <div class="grid-2">
      <!-- Points -->
      <div class="card fade">
        <div class="card-label">Season Points</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:1rem;">
          <div class="rank-big" id="total-pts">0</div>
          <div class="rank-lbl">pts</div>
          <div style="margin-left:auto;text-align:right;">
            <div class="rank-big" id="rank-num" style="font-size:30px;">—</div>
            <div class="rank-lbl">rank</div>
          </div>
        </div>
        <div id="points-breakdown"></div>
      </div>
      <!-- Rating profile -->
      <div class="card fade">
        <div class="card-label">Rating Profile</div>
        <div id="rating-profile"></div>
      </div>
    </div>

    <!-- Season stats -->
    <div class="card fade" style="margin-bottom:1rem;">
      <div class="card-label">Season Stats</div>
      <div class="stats-row" id="stats-row"></div>
    </div>

    <!-- Recommended film -->
    <div class="card fade" id="reco-card" style="margin-bottom:1rem;display:none;">
      <div class="card-label">Film Recommended</div>
      <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin-bottom:4px;" id="reco-film">—</div>
      <div style="font-size:12px;color:var(--muted);" id="reco-avg"></div>
    </div>

    <!-- Reviews -->
    <div class="card fade">
      <div class="card-label" id="reviews-label">Reviews This Season</div>
      <div id="review-list"></div>
    </div>
  </div>
</div><!-- end content -->
  </div><!-- end sidebar -->
  </div><!-- end profile-layout -->

<footer>THE CINEMATIC CIRCLE · EST. 2025</footer>

<script>
const API='https://script.google.com/macros/s/AKfycbxeXMVQXnstNiWBpN4ljBQuKwiS02tnHSMRzJ_TZ3WFWID5CoCjOjt2fkxjLSHuPxYf/exec';
const TMDB_KEY='b97ae7517bfb7f0af5594f16ca31c5f6';
const TMDB_IMG='https://image.tmdb.org/t/p/w92';

const TIERS=[
  {min:8,label:'Certified Great',bg:'#E1F5EE',color:'#0F6E56'},
  {min:6.5,label:'Good Watch',bg:'#E6F1FB',color:'#185FA5'},
  {min:5,label:'Okay',bg:'#FAEEDA',color:'#854F0B'},
  {min:0,label:'Never Again!',bg:'#FCEBEB',color:'#A32D2D'}
];

function getTier(s){return TIERS.find(t=>s>=t.min)||TIERS[TIERS.length-1];}
function parseScore(r){const m=String(r||'').match(/[\d.]+/);return m?parseFloat(m[0]):NaN;}
function avg(a){const v=a.filter(n=>!isNaN(n));return v.length?v.reduce((a,b)=>a+b,0)/v.length:NaN;}
function getName(e){return(e.name||e.member||e['your name']||'').trim();}
function getScore(e){return parseScore(e.score||e.rating||e['score (1\u201310)']||e['score (1-10)']||'0');}
function getTitle(e){return(e.title||e.film||e['film title']||'').trim();}

function parseDateSafe(raw){
  if(!raw)return new Date(NaN);
  const s=String(raw).trim();
  const d=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(.*)/);
  if(d)return new Date(`${d[3]}-${d[2].padStart(2,'0')}-${d[1].padStart(2,'0')}${d[4]}`);
  return new Date(s);
}

function formatDate(raw){
  if(!raw)return'';
  const d=parseDateSafe(raw);
  if(isNaN(d))return raw;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

async function safeFetch(sheet){
  try{const r=await fetch(`${API}?sheet=${sheet}`);if(!r.ok)return[];return await r.json();}
  catch{return[];}
}

async function getPoster(title){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`);
    const d=await r.json();
    const p=d.results?.[0]?.poster_path;
    return p?TMDB_IMG+p:null;
  }catch{return null;}
}

async function loadProfile(){
  const params=new URLSearchParams(window.location.search);
  const memberName=params.get('name')||'';
  if(!memberName){document.getElementById('loading').textContent='No member specified.';return;}
  document.title=`TCC — ${memberName}`;

  const[entries,pointsRows,recoRows]=await Promise.all([
    safeFetch('responses'),safeFetch('points'),safeFetch('reco_order')
  ]);

  const recoEntry=recoRows.find(r=>(r.member||r[Object.keys(r)[0]]||'').toLowerCase()===memberName.toLowerCase());
  const photoUrl=recoEntry?.photo||recoEntry?.Photo||'';
  const letterboxdUrl=recoEntry?.letterboxd||recoEntry?.Letterboxd||'';
  const recoFilmTitle=recoEntry?.['recommended film']||'';

  const myEntries=entries.filter(e=>getName(e).toLowerCase()===memberName.toLowerCase());
  const myScores=myEntries.map(getScore).filter(n=>!isNaN(n));
  const myAvg=avg(myScores);

  // Points calculation
  const allMembers={};
  entries.forEach(e=>{const n=getName(e);if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};});

  const groups={};
  entries.forEach(e=>{const t=getTitle(e)||'?';if(!groups[t])groups[t]=[];groups[t].push(e);});
  Object.values(groups).forEach(revs=>{
    const sorted=[...revs].sort((a,b)=>+parseDateSafe(a.timestamp||'')-+parseDateSafe(b.timestamp||''));
    const ws=parseDateSafe(sorted[0]?.['week start']||'');
    const wed=new Date(ws);
    if(!isNaN(wed)){
      wed.setDate(ws.getDate()+(3-ws.getDay()+7)%7);wed.setHours(18,0,0,0);
      sorted.filter(e=>{const d=parseDateSafe(e.timestamp||'');return d>=ws&&d<wed;})
        .slice(0,5).forEach((e,i)=>{
          const n=getName(e);
          if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};
          allMembers[n].early+=[5,4,3,2,1][i];
        });
    }
  });

  pointsRows.forEach(r=>{
    const n=(r.member||'').trim();
    const type=(r['points type']||'').toLowerCase();
    const pts=parseFloat(r.points||'0');
    if(!n)return;
    if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};
    if(type.includes('early'))allMembers[n].early+=pts;
    else if(type.includes('trivia'))allMembers[n].trivia+=pts;
    else if(type.includes('fotm')||type.includes('film of month'))allMembers[n].fotm+=pts;
    else if(type.includes('motm')||type.includes('member of month'))allMembers[n].motm+=pts;
    else if(type.includes('deduction'))allMembers[n].deductions+=Math.abs(pts);
  });

  const myPts=allMembers[memberName]||{early:0,fotm:0,trivia:0,motm:0,deductions:0};
  const myTotal=myPts.early+myPts.fotm+myPts.trivia+myPts.motm-myPts.deductions;

  const ranked=Object.entries(allMembers)
    .map(([n,p])=>({name:n,total:p.early+p.fotm+p.trivia+p.motm-p.deductions}))
    .sort((a,b)=>b.total-a.total);
  const myRank=ranked.findIndex(r=>r.name.toLowerCase()===memberName.toLowerCase())+1;

  // Badges
  const badges=[];
  if(myRank===1)badges.push('🏆 #1 This Season');
  if(myPts.trivia>0)badges.push('🎯 Trivia Winner');
  if(myPts.fotm>0)badges.push('🎬 Film of the Month');
  if(myPts.motm>0)badges.push('⭐ Member of the Month');
  if(myEntries.length>=5)badges.push('📝 Active Reviewer');
  if(myPts.early>=10)badges.push('⚡ Early Bird');

  // Personality
  const personality=isNaN(myAvg)?'The Cinephile':myAvg>=8.5?'The Enthusiast':myAvg>=7?'The Balanced Critic':myAvg>=5.5?'The Discerning Eye':'The Harsh Critic';

  // Tagline
  const topFilm=myScores.length?getTitle(myEntries.find(e=>getScore(e)===Math.max(...myScores)))||null:null;
  const tagline=topFilm?`"${topFilm} changed everything."`:null;

  // Genre label
  const tCounts=TIERS.map(t=>myScores.filter(s=>s>=t.min&&(TIERS[TIERS.indexOf(t)-1]?s<TIERS[TIERS.indexOf(t)-1].min:true)).length);
  const dominantIdx=tCounts.indexOf(Math.max(...tCounts));
  const genreLabels=['Certified Cinema','Quality Fare','Mixed Bag','Tough Crowd'];
  const genreLabel=myScores.length?genreLabels[dominantIdx]:'Cinephile';

  // RENDER
  document.getElementById('loading').style.display='none';
  document.getElementById('profile-wrap').style.display='block';

  // Poster
  const posterBg=document.getElementById('poster-bg');
  if(photoUrl){posterBg.style.backgroundImage=`url('${photoUrl}')`;}
  else{posterBg.style.background='linear-gradient(160deg,#1A1205 0%,#2A1A0A 40%,#0A0A1A 100%)';}

  document.getElementById('poster-name').textContent=memberName;
  document.getElementById('poster-role').textContent=personality;
  document.getElementById('poster-stats').innerHTML=`
    <div><div class="ps-val">${myEntries.length}</div><div class="ps-lbl">Reviews</div></div>
    <div><div class="ps-val">${isNaN(myAvg)?'—':myAvg.toFixed(1)}</div><div class="ps-lbl">Avg</div></div>
    <div><div class="ps-val">${myRank?'#'+myRank:'—'}</div><div class="ps-lbl">Rank</div></div>
    <div><div class="ps-val">${myTotal}</div><div class="ps-lbl">Pts</div></div>`;
  document.getElementById('poster-genres').innerHTML=`<span class="poster-genre">${genreLabel}</span>${myRank<=3?'<span class="poster-genre">Top 3</span>':''}`;
  document.getElementById('poster-badges').innerHTML=badges.map(b=>`<span class="poster-badge">${b}</span>`).join('');
  if(tagline)document.getElementById('poster-tagline').textContent=tagline;

  // Letterboxd
  if(letterboxdUrl){
    document.getElementById('lb-wrap').innerHTML=`<a href="${letterboxdUrl}" target="_blank" class="lb-btn">🎬 View on Letterboxd</a>`;
  }

  // Points breakdown
  document.getElementById('total-pts').textContent=myTotal;
  document.getElementById('rank-num').textContent=myRank?`#${myRank}`:'—';
  document.getElementById('points-breakdown').innerHTML=`
    <div class="points-row"><span class="points-type">Early Watch</span><span class="points-val">${myPts.early}</span></div>
    <div class="points-row"><span class="points-type">Film of Month</span><span class="points-val">${myPts.fotm}</span></div>
    <div class="points-row"><span class="points-type">Trivia</span><span class="points-val">${myPts.trivia}</span></div>
    <div class="points-row"><span class="points-type">Member of Month</span><span class="points-val">${myPts.motm}</span></div>
    ${myPts.deductions?`<div class="points-row"><span class="points-type" style="color:var(--red);">Deductions</span><span class="points-val" style="color:var(--red);">-${myPts.deductions}</span></div>`:''}`;

  // Rating profile
  const generous=isNaN(myAvg)?'—':myAvg>=8?'Very Generous':myAvg>=6.5?'Balanced':myAvg>=5?'Critical':'Harsh Critic';
  document.getElementById('rating-profile').innerHTML=`
    <div style="margin-bottom:1rem;">
      <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);">${generous}</div>
      <div style="font-size:11px;color:var(--muted);">Rating personality</div>
    </div>
    ${TIERS.map(t=>{
      const count=myScores.filter(s=>s>=t.min&&(TIERS[TIERS.indexOf(t)-1]?s<TIERS[TIERS.indexOf(t)-1].min:true)).length;
      return `<div class="rating-bar-wrap">
        <div class="rating-bar-label"><span>${t.label}</span><span>${count}</span></div>
        <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${myScores.length?count/myScores.length*100:0}%;background:${t.color};"></div></div>
      </div>`;
    }).join('')}`;

  // Season stats
  const highScore=myScores.length?Math.max(...myScores):null;
  const lowScore=myScores.length?Math.min(...myScores):null;
  const highFilm=highScore!==null?getTitle(myEntries.find(e=>getScore(e)===highScore))||'':null;
  const lowFilm=lowScore!==null?getTitle(myEntries.find(e=>getScore(e)===lowScore))||'':null;
  document.getElementById('stats-row').innerHTML=`
    <div><div class="stat-val">${myEntries.length}</div><div class="stat-lbl">Reviews</div></div>
    <div><div class="stat-val">${isNaN(myAvg)?'—':myAvg.toFixed(1)}</div><div class="stat-lbl">Avg Score</div></div>
    ${highScore!==null?`<div><div class="stat-val">${highScore.toFixed(1)}</div><div class="stat-lbl">Highest</div><div class="stat-sub">${highFilm}</div></div>`:''}
    ${lowScore!==null&&lowScore!==highScore?`<div><div class="stat-val">${lowScore.toFixed(1)}</div><div class="stat-lbl">Lowest</div><div class="stat-sub">${lowFilm}</div></div>`:''}`;

  // Recommended film
  if(recoFilmTitle){
    const recoRevs=entries.filter(e=>getTitle(e).toLowerCase()===recoFilmTitle.toLowerCase());
    const recoAvg=avg(recoRevs.map(getScore).filter(n=>!isNaN(n)));
    document.getElementById('reco-card').style.display='block';
    document.getElementById('reco-film').textContent=recoFilmTitle;
    document.getElementById('reco-avg').textContent=isNaN(recoAvg)?'No reviews yet':`Group average: ${recoAvg.toFixed(1)} · ${recoRevs.length} review${recoRevs.length!==1?'s':''}`;
  }

  // Reviews
  const sorted=[...myEntries].sort((a,b)=>+parseDateSafe(b.timestamp||'')-+parseDateSafe(a.timestamp||''));
  document.getElementById('reviews-label').textContent=`Reviews This Season · ${sorted.length}`;
  const reviewList=document.getElementById('review-list');
  if(!sorted.length){reviewList.innerHTML='<div class="empty">No reviews logged yet.</div>';return;}

  reviewList.innerHTML=sorted.map(e=>{
    const s=getScore(e);const t=isNaN(s)?TIERS[TIERS.length-1]:getTier(s);
    const take=e.take||e.review||e['one-line take']||'';
    return`<div class="review-item">
      <div class="review-info">
        <div class="review-film">${getTitle(e)}<span class="review-pill" style="background:${t.bg};color:${t.color};">${t.label}</span></div>
        ${take?`<div class="review-take">"${take}"</div>`:''}
        <div class="review-date">${formatDate(e.timestamp||e.date||'')}</div>
      </div>
      <div class="review-score">${isNaN(s)?'—':s.toFixed(1)}</div>
    </div>`;
  }).join('');
}

loadProfile();
</script>
</body>
</html>
