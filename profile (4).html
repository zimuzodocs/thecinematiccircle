<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCC — Member Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F7F5F0;--surface:#fff;--surface2:#F0EDE8;--border:#E5E2DA;
      --ink:#1A1A1A;--muted:#888;--gold:#9A6E1A;--gold-light:#C9A84C;
      --green:#0F6E56;--green-bg:#E1F5EE;--blue:#185FA5;--blue-bg:#E6F1FB;
      --amber:#854F0B;--amber-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

    /* HEADER */
    header{background:rgba(247,245,240,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 2rem;gap:12px;position:sticky;top:0;z-index:100;}
    .back-btn{font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:none;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.15s;}
    .back-btn:hover{color:var(--ink);border-color:var(--ink);}
    .header-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--ink);}
    .header-sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

    /* HERO */
    .hero{max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 0;display:flex;gap:1.5rem;align-items:stretch;}
    .hero-card{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:9/16;width:280px;flex-shrink:0;display:flex;align-items:flex-end;}
    .hero-panel{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1.5rem;min-width:0;}
    .hero-panel-block{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem;}
    @media(max-width:700px){
      .hero{flex-direction:column;}
      .hero-card{width:100%;max-width:360px;margin:0 auto;aspect-ratio:9/16;}
      .hero-panel{width:100%;}
    }
    .poster-bg{position:absolute;inset:0;background-size:cover;background-position:center top;background-color:#1A1A1A;z-index:0;}
    .poster-overlay{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.92) 100%);z-index:1;}
    .poster-grain{position:absolute;inset:0;opacity:0.04;z-index:2;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
    .poster-content{position:relative;z-index:3;padding:1.5rem;width:100%;}
    .poster-club{font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-light);margin-bottom:0.5rem;}
    .poster-name{font-family:'Playfair Display',serif;font-size:clamp(40px,10vw,72px);color:#fff;line-height:1;margin-bottom:4px;text-shadow:0 2px 20px rgba(0,0,0,0.5);letter-spacing:-0.01em;}
    .poster-role{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,3vw,20px);color:var(--gold-light);margin-bottom:1rem;}
    .poster-stats{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem;}
    .poster-stat-val{font-family:'Playfair Display',serif;font-size:22px;color:#fff;line-height:1;}
    .poster-stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:1px;}
    .poster-tagline{font-size:12px;color:rgba(255,255,255,0.6);font-style:italic;margin-bottom:1rem;line-height:1.5;}
    .poster-genre{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--gold-light);color:var(--gold-light);border-radius:2px;margin-right:6px;margin-bottom:0.75rem;}
    .poster-badges{display:flex;gap:6px;flex-wrap:wrap;}
    .poster-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;backdrop-filter:blur(4px);}
    .avatar{display:none;}
    .hero-info{flex:1;}
    .member-name{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);margin-bottom:4px;}
    .member-since{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1rem;}
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
    .badge{font-size:10px;font-weight:600;letter-spacing:0.06em;padding:3px 10px;border-radius:999px;text-transform:uppercase;}
    .badge-gold{background:#FFF8E1;color:var(--gold);}
    .badge-green{background:var(--green-bg);color:var(--green);}
    .badge-blue{background:var(--blue-bg);color:var(--blue);}
    .badge-red{background:var(--red-bg);color:var(--red);}

    /* STATS */
    .stats-row{display:flex;gap:2rem;flex-wrap:wrap;}
    .stat-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--ink);line-height:1;}
    .stat-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

    /* MAIN CONTENT */
    .content{max-width:900px;margin:0 auto;padding:1.5rem;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
    @media(max-width:600px){.grid-2{grid-template-columns:1fr;}.hero-card{flex-direction:column;}}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem;}
    .card-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
    .card-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin-bottom:4px;}
    .card-sub{font-size:12px;color:var(--muted);}

    /* RATING BAR */
    .rating-bar-wrap{margin-bottom:0.75rem;}
    .rating-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink);margin-bottom:4px;}
    .rating-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .rating-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}

    /* REVIEWS */
    .review-list{display:flex;flex-direction:column;gap:8px;margin-top:0.5rem;}
    .review-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
    .review-item:last-child{border-bottom:none;}
    .review-score{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);min-width:36px;text-align:center;line-height:1;padding-top:2px;}
    .review-info{flex:1;}
    .review-film{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;}
    .review-take{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;}
    .review-date{font-size:10px;color:#BBB;margin-top:4px;}
    .review-pill{display:inline-block;font-size:8px;font-weight:600;padding:2px 6px;border-radius:999px;margin-left:6px;vertical-align:middle;}

    /* POINTS BREAKDOWN */
    .points-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .points-row:last-child{border-bottom:none;}
    .points-type{color:var(--muted);}
    .points-val{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);}

    /* RANK DISPLAY */
    .rank-big{font-family:'Playfair Display',serif;font-size:48px;color:var(--gold);line-height:1;}
    .rank-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}

    .empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
    .loading{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .fade{animation:fadeUp 0.4s ease both;}

    footer{text-align:center;padding:2rem;font-size:11px;color:#CCC;letter-spacing:0.06em;text-transform:uppercase;margin-top:2rem;}
  </style>
</head>
<body>

<header>
  <a href="https://zimuzodocs.github.io/thecinematiccircle" class="back-btn">← Hub</a>
  <div>
    <div class="header-title">The Cinematic Circle</div>
    <div class="header-sub">Member Profile</div>
  </div>
</header>

<div id="loading" class="loading">Loading profile…</div>
<div id="profile-wrap" style="display:none;">
  <div class="hero">

    <!-- LEFT: Poster -->
    <div class="hero-card fade" id="hero-card">
      <div class="poster-bg" id="poster-bg"></div>
      <div style="position:absolute;top:1.5rem;right:1.5rem;z-index:4;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:0.15em;color:rgba(255,255,255,0.6);text-transform:uppercase;border:1px solid rgba(255,255,255,0.2);padding:4px 10px;border-radius:2px;">TCC 2026</div>
      <div class="poster-overlay"></div>
      <div class="poster-grain"></div>
      <!-- Top bar -->
      <div style="position:absolute;top:0;left:0;right:0;z-index:3;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.6);">THE CINEMATIC CIRCLE</div>
        <div style="font-size:9px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-light);">SEASON 2026</div>
      </div>
      <!-- Bottom content (poster overlay) -->
      <div class="poster-content">
        <div id="poster-genres" style="margin-bottom:0.75rem;"></div>
        <div class="poster-name" id="member-name">—</div>
        <div class="poster-role" id="poster-role" style="margin-bottom:1.25rem;"></div>
        <div class="poster-tagline" id="poster-tagline"></div>
      </div>
    </div>

    <!-- RIGHT: Info panel -->
    <div class="hero-panel fade">

      <!-- Name + badges -->
      <div class="hero-panel-block">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;">Member</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);line-height:1.1;margin-bottom:0.5rem;" id="panel-name">—</div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1rem;" id="member-since">THE CINEMATIC CIRCLE · SEASON 2026</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="badges"></div>
      </div>

      <!-- Stats -->
      <div class="hero-panel-block">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;">Season Stats</div>
        <div class="stats-row" id="stats-row"></div>
      </div>

      <!-- Points + rank -->
      <div class="hero-panel-block">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;">Season Points</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:1rem;">
          <div class="rank-big" id="total-pts">0</div>
          <div class="rank-label">total pts</div>
          <div style="margin-left:auto;text-align:right;">
            <div class="rank-big" id="rank-num" style="font-size:32px;">—</div>
            <div class="rank-label">rank</div>
          </div>
        </div>
        <div id="points-breakdown"></div>
      </div>

    </div>
  </div>

  <div class="content">
    <div class="grid-2">
      <!-- Rating profile -->
      <div class="card fade">
        <div class="card-label">Rating Profile</div>
        <div id="rating-profile"></div>
      </div>
    </div>

    <!-- Recommended film -->
    <div class="card fade" id="reco-card" style="margin-bottom:1.25rem;display:none;">
      <div class="card-label">Film Recommended</div>
      <div class="card-title" id="reco-film">—</div>
      <div class="card-sub" id="reco-avg"></div>
    </div>

    <!-- Reviews -->
    <div class="card fade">
      <div class="card-label" id="reviews-label">Reviews This Season</div>
      <div class="review-list" id="review-list"></div>
    </div>
  </div>
</div>

<footer>THE CINEMATIC CIRCLE · EST. 2025</footer>

<script>
const API='https://script.google.com/macros/s/AKfycbxeXMVQXnstNiWBpN4ljBQuKwiS02tnHSMRzJ_TZ3WFWID5CoCjOjt2fkxjLSHuPxYf/exec';
const TMDB_KEY='b97ae7517bfb7f0af5594f16ca31c5f6';
const TMDB_IMG='https://image.tmdb.org/t/p/w92';

const TIERS=[
  {min:8,label:'Certified Great',bg:'#E1F5EE',color:'#0F6E56'},
  {min:6.5,label:'Good Watch',bg:'#E6F1FB',color:'#185FA5'},
  {min:5,label:'Okay',bg:'#FAEEDA',color:'#854F0B'},
  {min:0,label:'Never Again!',bg:'#FCEBEB',color:'#A32D2D'}
];

function getTier(s){return TIERS.find(t=>s>=t.min)||TIERS[TIERS.length-1];}
function parseScore(raw){const m=String(raw||'').match(/[\d.]+/);return m?parseFloat(m[0]):NaN;}
function avg(arr){const v=arr.filter(n=>!isNaN(n));return v.length?v.reduce((a,b)=>a+b,0)/v.length:NaN;}
function getName(e){return(e.name||e.member||e['your name']||'').trim();}
function getScore(e){return parseScore(e.score||e.rating||e['score (1\u201310)']||e['score (1-10)']||'0');}
function getTitle(e){return(e.title||e.film||e['film title']||'').trim();}

function parseDateSafe(raw){
  if(!raw)return new Date(NaN);
  const s=String(raw).trim();
  const ddmm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(.*)/);
  if(ddmm)return new Date(`${ddmm[3]}-${ddmm[2].padStart(2,'0')}-${ddmm[1].padStart(2,'0')}${ddmm[4]}`);
  return new Date(s);
}

function formatDate(raw){
  if(!raw)return'';
  const d=parseDateSafe(raw);
  if(isNaN(d))return raw;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

async function safeFetch(sheet){
  try{
    const r=await fetch(`${API}?sheet=${sheet}`);
    if(!r.ok)return[];
    return await r.json();
  }catch{return[];}
}

async function getPoster(title){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`);
    const d=await r.json();
    const p=d.results?.[0]?.poster_path;
    return p?TMDB_IMG+p:null;
  }catch{return null;}
}

async function loadProfile(){
  const params=new URLSearchParams(window.location.search);
  const memberName=params.get('name')||'';

  if(!memberName){
    document.getElementById('loading').textContent='No member specified.';
    return;
  }

  document.title=`TCC — ${memberName}`;

  const[entries,pointsRows,recoRows]=await Promise.all([
    safeFetch('responses'),
    safeFetch('points'),
    safeFetch('reco_order')
  ]);

  // Find member's photo from reco_order sheet
  const recoEntry=recoRows.find(r=>(r.member||r[Object.keys(r)[0]]||'').toLowerCase()===memberName.toLowerCase());
  const photoUrl=recoEntry?.photo||recoEntry?.Photo||'';

  // Filter entries for this member
  const myEntries=entries.filter(e=>getName(e).toLowerCase()===memberName.toLowerCase());
  const myScores=myEntries.map(getScore).filter(n=>!isNaN(n));
  const myAvg=avg(myScores);

  // All members for ranking
  const allMembers={};
  entries.forEach(e=>{
    const n=getName(e);
    if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};
  });

  // Calculate early watch points for everyone
  const groups={};
  entries.forEach(e=>{const t=getTitle(e)||'?';if(!groups[t])groups[t]=[];groups[t].push(e);});
  Object.values(groups).forEach(revs=>{
    const sorted=[...revs].sort((a,b)=>+parseDateSafe(a.timestamp||'')-+parseDateSafe(b.timestamp||''));
    const ws=parseDateSafe(sorted[0]?.['week start']||'');
    const wed=new Date(ws);
    if(!isNaN(wed)){
      wed.setDate(ws.getDate()+(3-ws.getDay()+7)%7);
      wed.setHours(18,0,0,0);
      sorted.filter(e=>{const d=parseDateSafe(e.timestamp||'');return d>=ws&&d<wed;})
        .slice(0,5).forEach((e,i)=>{
          const n=getName(e);
          if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};
          allMembers[n].early+=[5,4,3,2,1][i];
        });
    }
  });

  // Manual points
  pointsRows.forEach(r=>{
    const n=(r.member||'').trim();
    const type=(r['points type']||'').toLowerCase();
    const pts=parseFloat(r.points||'0');
    if(!n)return;
    if(!allMembers[n])allMembers[n]={early:0,fotm:0,trivia:0,motm:0,deductions:0};
    if(type.includes('early'))allMembers[n].early+=pts;
    else if(type.includes('trivia'))allMembers[n].trivia+=pts;
    else if(type.includes('fotm')||type.includes('film of month'))allMembers[n].fotm+=pts;
    else if(type.includes('motm')||type.includes('member of month'))allMembers[n].motm+=pts;
    else if(type.includes('deduction'))allMembers[n].deductions+=Math.abs(pts);
  });

  const myPts=allMembers[memberName]||{early:0,fotm:0,trivia:0,motm:0,deductions:0};
  const myTotal=myPts.early+myPts.fotm+myPts.trivia+myPts.motm-myPts.deductions;

  // Ranking
  const ranked=Object.entries(allMembers)
    .map(([n,p])=>({name:n,total:p.early+p.fotm+p.trivia+p.motm-p.deductions}))
    .sort((a,b)=>b.total-a.total);
  const myRank=ranked.findIndex(r=>r.name.toLowerCase()===memberName.toLowerCase())+1;

  // Recommended film
  const myRecoFilm=myEntries.find(e=>e.recommender&&e.recommender.toLowerCase()===memberName.toLowerCase());
  const recoFilmTitle=recoEntry?.['recommended film']||'';

  // Badges
  const badges=[];
  if(myRank===1)badges.push({text:'🏆 #1 This Season',cls:'badge-gold'});
  if(myPts.trivia>0)badges.push({text:'🎯 Trivia Winner',cls:'badge-blue'});
  if(myPts.fotm>0)badges.push({text:'🎬 Film of the Month',cls:'badge-green'});
  if(myPts.motm>0)badges.push({text:'⭐ Member of the Month',cls:'badge-gold'});
  if(myEntries.length>=5)badges.push({text:'📝 Active Reviewer',cls:'badge-blue'});
  if(myPts.early>=10)badges.push({text:'⚡ Early Bird',cls:'badge-green'});

  // Render
  document.getElementById('loading').style.display='none';
  document.getElementById('profile-wrap').style.display='block';

  document.getElementById('member-name').textContent=memberName;
  document.getElementById('panel-name').textContent=memberName;
  document.getElementById('member-since').textContent='THE CINEMATIC CIRCLE · SEASON 2026';

  // Badges
  document.getElementById('badges').innerHTML=badges.map(b=>`<span class="badge ${b.cls}">${b.text}</span>`).join('');

  // Stats
  document.getElementById('stats-row').innerHTML=`
    <div><div class="stat-val">${myEntries.length}</div><div class="stat-lbl">Reviews</div></div>
    <div><div class="stat-val">${isNaN(myAvg)?'—':myAvg.toFixed(1)}</div><div class="stat-lbl">Avg Score</div></div>
    <div><div class="stat-val">${myScores.length?Math.max(...myScores).toFixed(1):'—'}</div><div class="stat-lbl">Highest</div></div>
    <div><div class="stat-val">${myScores.length?Math.min(...myScores).toFixed(1):'—'}</div><div class="stat-lbl">Lowest</div></div>`;

  // Points
  document.getElementById('total-pts').textContent=myTotal;
  document.getElementById('rank-num').textContent=myRank?`#${myRank}`:'—';
  document.getElementById('points-breakdown').innerHTML=`
    <div class="points-row"><span class="points-type">Early Watch</span><span class="points-val">${myPts.early}</span></div>
    <div class="points-row"><span class="points-type">Film of Month</span><span class="points-val">${myPts.fotm}</span></div>
    <div class="points-row"><span class="points-type">Trivia</span><span class="points-val">${myPts.trivia}</span></div>
    <div class="points-row"><span class="points-type">Member of Month</span><span class="points-val">${myPts.motm}</span></div>
    ${myPts.deductions?`<div class="points-row"><span class="points-type" style="color:var(--red);">Deductions</span><span class="points-val" style="color:var(--red);">-${myPts.deductions}</span></div>`:''}`;

  // Rating profile
  const generous=isNaN(myAvg)?'—':myAvg>=8?'Very Generous':myAvg>=6.5?'Balanced':myAvg>=5?'Critical':'Harsh Critic';
  const tierCounts=TIERS.map(t=>({
    label:t.label,
    count:myScores.filter(s=>s>=t.min&&(TIERS[TIERS.indexOf(t)-1]?s<TIERS[TIERS.indexOf(t)-1].min:true)).length,
    color:t.color,bg:t.bg
  }));
  document.getElementById('rating-profile').innerHTML=`
    <div style="margin-bottom:1rem;">
      <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);">${generous}</div>
      <div style="font-size:11px;color:var(--muted);">Rating personality</div>
    </div>
    ${tierCounts.map(t=>`
      <div class="rating-bar-wrap">
        <div class="rating-bar-label"><span>${t.label}</span><span>${t.count}</span></div>
        <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${myScores.length?t.count/myScores.length*100:0}%;background:${t.color};"></div></div>
      </div>`).join('')}`;

  // Recommended film card
  if(recoFilmTitle){
    const recoRevs=entries.filter(e=>getTitle(e).toLowerCase()===recoFilmTitle.toLowerCase());
    const recoScores=recoRevs.map(getScore).filter(n=>!isNaN(n));
    const recoAvg=avg(recoScores);
    document.getElementById('reco-card').style.display='block';
    document.getElementById('reco-film').textContent=recoFilmTitle;
    document.getElementById('reco-avg').textContent=isNaN(recoAvg)?'No reviews yet':`Group average: ${recoAvg.toFixed(1)} · ${recoRevs.length} review${recoRevs.length!==1?'s':''}`;
  }

  // Reviews
  const sorted=[...myEntries].sort((a,b)=>+parseDateSafe(b.timestamp||'')-+parseDateSafe(a.timestamp||''));
  const reviewsLabel=document.getElementById('reviews-label');
  reviewsLabel.textContent=`Reviews This Season · ${sorted.length}`;
  const reviewList=document.getElementById('review-list');
  if(!sorted.length){
    reviewList.innerHTML='<div class="empty">No reviews logged yet.</div>';
  } else {
    reviewList.innerHTML=sorted.map(async e=>{
      const s=getScore(e);
      const t=isNaN(s)?TIERS[TIERS.length-1]:getTier(s);
      const take=e.take||e.review||e['one-line take']||'';
      const title=getTitle(e);
      const poster=await getPoster(title);
      return `<div class="review-item">
        ${poster?`<img src="${poster}" style="width:36px;height:52px;object-fit:cover;border-radius:2px;flex-shrink:0;" alt="${title}"/>`:''}
        <div style="flex:1;min-width:0;">
          <div class="review-film">${title}<span class="review-pill" style="background:${t.bg};color:${t.color};">${t.label}</span></div>
          ${take?`<div class="review-take">"${take}"</div>`:''}
          <div class="review-date">${formatDate(e.timestamp||e.date||'')}</div>
        </div>
        <div class="review-score">${isNaN(s)?'—':s.toFixed(1)}</div>
      </div>`;
    }).map(p=>p instanceof Promise?'<div class="review-item"><div class="empty" style="padding:0.5rem;">Loading…</div></div>':p).join('');

    // Resolve posters
    sorted.forEach(async(e,i)=>{
      const title=getTitle(e);
      const s=getScore(e);
      const t=isNaN(s)?TIERS[TIERS.length-1]:getTier(s);
      const take=e.take||e.review||e['one-line take']||'';
      const poster=await getPoster(title);
      const items=reviewList.querySelectorAll('.review-item');
      if(items[i]){
        items[i].innerHTML=`
          ${poster?`<img src="${poster}" style="width:36px;height:52px;object-fit:cover;border-radius:2px;flex-shrink:0;" alt="${title}"/>`:''}
          <div style="flex:1;min-width:0;">
            <div class="review-film">${title}<span class="review-pill" style="background:${t.bg};color:${t.color};">${t.label}</span></div>
            ${take?`<div class="review-take">"${take}"</div>`:''}
            <div class="review-date">${formatDate(e.timestamp||e.date||'')}</div>
          </div>
          <div class="review-score">${isNaN(s)?'—':s.toFixed(1)}</div>`;
      }
    });
  }
}

loadProfile();
</script>
</body>
</html>
